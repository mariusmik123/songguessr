<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Energy</title>
  <link rel="stylesheet" type="text/css" href="css/energySite.css">
</head>
<body>

  <!-- NAVBAR -->
  <div class="navBar">
    <button class="backBtn js-backBtn">⬅ Back</button>
    <div class="energyBtn">⚡ 0</div>
  </div>

  <!-- MAIN -->
  <div class="energy-container">

    <h1 class="title">ENERGY STATION</h1>

    <!-- ACTION BUTTONS -->
    <div class="energy-actions">

      <button class="energy-btn primary js-infinityEnergyBtn">
        ⚡ Buy Infinite Energy
        <span class="sub">Play without limits</span>
      </button>

      <button class="energy-btn secondary js-videoBtn">
        🎥 Watch Ad for Energy
        <span class="sub">+3 Energy instantly</span>
      </button>

    </div>

    <!-- EXTRA SECTION -->
    <div class="info-section">

      <h2>Tips & Updates</h2>

      <div class="info-card">
        ⚡ Energy refills over time  
        <span>+1 every 5 minutes</span>
      </div>

      <div class="info-card">
        🚀 Coming Soon  
        <span>Daily rewards & streak bonuses</span>
      </div>

      <div class="info-card">
        🏆 Play more  
        <span>Earn trophies and climb leaderboard</span>
      </div>

    </div>

  </div>

<script type="module" src="js/energySite.js"></script>

</body>
</html>
